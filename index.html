<body>
  <main class="page">
    <section class="landing-card">

      <img class="cover" src="assets/cover.jpg" alt="ZOYA cover image" />

      <div id="stepSignup" class="content">
        <h1>Unlock The Next ZOYA Release</h1>

        <form id="signupForm">
          <input type="text" id="name" placeholder="Your name" required />
          <input type="email" id="email" placeholder="Your email" required />

            <input type="checkbox" required />

        <p id="errorMessage" class="error hidden">
          Something went wrong. Please try again.
        </p>
      </div>

 <div id="stepDownload" class="content hidden">
  <h1>Private Preview Unlocked</h1>

  <div class="custom-player">
    <audio id="audioPlayer" preload="auto">
      <source src="https://newsletter.zoyasmusic.com/downloads/zoya-unreleased.mp3?v=20" type="audio/mpeg">
    </audio>

    <button id="playPauseBtn" class="play-circle" type="button">▶</button>

    <div class="track-title">ZOYA - ID</div>

    <div class="progress-wrap">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <button id="spotifyRevealBtn" type="button">
    Follow On Spotify
  </button>
</div>
