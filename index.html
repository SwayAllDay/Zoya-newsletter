<body>
  <main class="page">
    <section class="landing-card">

      <img class="cover" src="assets/cover.jpg" alt="ZOYA cover image" />

      <div id="stepSignup" class="content">
        <h1>Unlock The Next ZOYA Release</h1>

        <form id="signupForm">
          <input type="text" id="name" placeholder="Your name" required />
          <input type="email" id="email" placeholder="Your email" required />

          <label class="consent">
            <input type="checkbox" required />
            I agree to receive emails from ZOYA and can unsubscribe anytime.
          </label>

          <button type="submit">Get Free Access</button>
        </form>

        <p id="errorMessage" class="error hidden">
          Something went wrong. Please try again.
        </p>
      </div>

     <div id="stepDownload" class="content hidden">
 <h1>Private Preview Unlocked</h1>
  <p class="subtext">Press play to hear the unreleased ZOYA track.</p>

<div class="custom-player">
  <audio id="audioPlayer" preload="metadata">
    <source
      src="https://newsletter.zoyasmusic.com/downloads/zoya-unreleased.mp3?v=10"
      type="audio/mpeg"
    >
  </audio>

  <button id="playPauseBtn" class="play-button" type="button">
    ▶
  </button>

  <div class="player-info">
    <p class="track-title">ZOYA — Unreleased Preview</p>

    <div class="progress-wrap">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>
</div>
