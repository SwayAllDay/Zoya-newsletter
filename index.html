<body>
  <main class="page">
    <section class="card">
      <p class="eyebrow">ZOYA INNER CIRCLE</p>

      <h1>Get an unreleased ZOYA track for free</h1>

      <p class="subtext">
        Join the private ZOYA fan list and unlock a free download of an unreleased track.
      </p>

      <form id="signupForm">
        <input type="text" id="name" placeholder="Your name" required />
        <input type="email" id="email" placeholder="Your email" required />

        <label class="consent">
          <input type="checkbox" required />
          I agree to receive emails from ZOYA. I can unsubscribe anytime.
        </label>

        <button type="submit">Unlock Free Download</button>
      </form>

      <div id="successBox" class="hidden">
        <h2>You're in 🎧</h2>
        <p>Your free unreleased ZOYA track is now unlocked.</p>

    <a
  id="downloadBtn"
  class="button"
  href="downloads/zoya-unreleased.mp3"
  download="ZOYA-Unreleased.mp3"
>
  Download Free Track
</a>

        <a id="spotifyBtn" class="button secondary hidden" href="YOUR_SPOTIFY_LINK_HERE" target="_blank">
          Follow ZOYA on Spotify
        </a>
      </div>

      <p id="errorMessage" class="error hidden">
        Something went wrong. Please try again.
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
