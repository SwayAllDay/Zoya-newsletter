<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZOYA Inner Circle</title>
  <link rel="stylesheet" href="./style.css">

  <!-- Meta Pixel -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '686728073683776');
    fbq('track', 'PageView');
    fbq('track', 'ViewContent');
  </script>
</head>

<body>
  <main class="page">
    <section class="landing-card">

      <img class="cover" src="assets/cover.jpg" alt="ZOYA cover image" />

      <div id="stepSignup" class="content">
        <h1>Unlock The Next ZOYA Release</h1>

        <form id="signupForm">
          <input type="text" id="name" placeholder="Your name" required />
          <input type="email" id="email" placeholder="Your email" required />

          <label class="consent">
            <input type="checkbox" required />
            I agree to receive emails from ZOYA and can unsubscribe anytime.
          </label>

          <button type="submit">Get Free Access</button>
        </form>

        <p id="errorMessage" class="error hidden">
          Something went wrong. Please try again.
        </p>
      </div>

      <div id="stepDownload" class="content hidden">
        <h1>Your track is ready 🎧</h1>
        <p class="subtext">Thanks for joining the ZOYA Inner Circle.</p>

        <a
          id="downloadBtn"
          class="button"
          href="downloads/zoya-unreleased.mp3"
          download="ZOYA-Unreleased.mp3"
        >
          Download Free Track
        </a>
      </div>

      <div id="stepSpotify" class="content hidden">
        <h1>Follow ZOYA on Spotify</h1>
        <p class="subtext">Be the first to hear the next release.</p>

        <a
          id="spotifyBtn"
          class="button outline"
          href="https://open.spotify.com/artist/5eqThkuR9VjiLuYfzESTp7"
          target="_blank"
        >
          Follow on Spotify
        </a>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
